name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  eval-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eval/package-lock.json
      - run: npm install
      - run: npm run ci
